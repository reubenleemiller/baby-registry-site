<!DOCTYPE html>
<html lang="en">
<head>
<script>
  document.documentElement.classList.add('preloader-lock');
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donate to the Stroller Fund</title>
  <link rel="stylesheet" href="./assets/style.css" />
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body class="unlocked">
<div id="site-preloader" class="">
  <div class="preloader-spinner-wrapper">
    <div class="custom-spinner">
      <div></div>
    </div>
    <img src="assets/logo.png" class="preloader-logo" />
  </div>
</div>
  <section class="donation-goal">
    <h1>Complete Your Contribution</h1>
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
    <p id="progress-text">$0 raised of $500 goal</p>
  </section>

 <section class="donation-section">
  <form id="payment-form">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" name="firstName" required />

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" name="lastName" required />

    <label for="email">Email</label>
    <input type="email" id="email" name="email" required />

    <!-- Stripe mounts payment UI here -->
    <div id="payment-element"></div>

    <button type="submit" id="submit" class="animated-button custom-arrow-button">Submit Donation</button>
    <p id="error-message"></p>
  </form>
</section>
  <script src="scripts/preloader.js"></script>
  <script src="scripts/donation.js"></script>
</body>
</html>
