<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Donation Successful</title>
  <link href="../assets/style.css" rel="stylesheet" />
    <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background-color: #f9f9f9;
    }

    .success-container {
      background-color: white;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
    }

    .success-container h1 {
      color: #4caf50;
      font-size: 2rem;
      margin-bottom: 1rem;
    }

    .success-container p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="success-container">
    <h1>🎉 Thank You!</h1>
    <p id="donation-message">Your donation was successful.</p>
    <a href="../index.html" class="donate-button" style="text-decoration: none;">← Return to Registry</a>
  </div>

  <script>
    const queryParams = new URLSearchParams(window.location.search);
    const amount = queryParams.get("amount");

    if (amount && !isNaN(amount)) {
      document.getElementById("donation-message").textContent =
        `You successfully donated $${parseFloat(amount).toFixed(2)} CAD.`;
    }
  </script>
</body>
</html>
