<!DOCTYPE html>
<html>
  <head><title>Reset Progress</title></head>
  <body>
    <h2>Reset Donation Progress</h2>
    <input id="adminToken" placeholder="Enter Admin Token" />
    <button onclick="resetProgress()">Reset Now</button>
    <p id="result"></p>

    <script>
      async function resetProgress() {
        const token = document.getElementById("adminToken").value;
        const res = await fetch("https://baby-registry-backend.vercel.app/api/reset-progress", {
          method: "POST",
          headers: { "Authorization": token }
        });
        const data = await res.json();
        document.getElementById("result").innerText = data.message || "Done.";
      }
    </script>
  </body>
</html>
