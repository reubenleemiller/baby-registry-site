<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribute to the Stroller Fund</title>
  <link href="../assets/style.css" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <header>
    <h1>Contribute to Our Stroller Fund</h1>
    <p>We appreciate your support — every dollar helps!</p>
  </header>

  <section class="goal-section">
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="amount-text" id="amountText">$0 of $346.49 goal</div>
  </section>

  <section class="donation-section">
    <form id="payment-form">
      <input type="number" id="donation-amount" name="amount" placeholder="Enter donation (CAD)" min="1" required />
      <div id="payment-element"></div>
      <button id="submit">Submit Donation</button>
      <div id="error-message"></div>
    </form>
  </section>

  <script src="../scripts/donation.js"></script>
</body>
</html>
