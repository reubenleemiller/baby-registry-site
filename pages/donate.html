<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribute to the Stroller Fund</title>
  <link href="../assets/style.css" rel="stylesheet" />
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .donation-section form label,
    .donation-section form input {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 1rem;
    }
    #email, #firstName, #lastName {
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 100%;
      max-width: 400px;
    }
    #payment-element {
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contribute to Our Stroller Fund</h1>
    <p>We appreciate your support — every dollar helps!</p>
  </header>

  <section class="goal-section">
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="amount-text" id="amountText">$0 of $346.49 goal</div>
  </section>

  <section class="donation-section">
    <form id="payment-form">
      <div id="donationDisplay"></div>

      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName" required />
      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName" required />
      <label for="email">Email (for receipt):</label>
      <input type="email" id="email" name="email" required />

      <div id="payment-element"></div>
      <button id="submit" class="donate-button">Submit Donation</button>
      <div id="error-message" style="color: red; margin-top: 10px;"></div>
    </form>
  </section>

  <script src="../scripts/donation.js"></script>
  <script>
    async function fetchDonationProgress() {
      try {
        const res = await fetch("https://baby-registry-backend.vercel.app/api/get-donation-total");
        const { total } = await res.json();
        const goal = 346.49;
        const percent = Math.min((total / goal) * 100, 100);
        document.getElementById('progressBar').style.width = percent + '%';
        document.getElementById('amountText').textContent = `$${total.toFixed(2)} of $${goal} goal`;
      } catch (err) {
        console.error("⚠️ Failed to fetch donation progress:", err.message);
      }
    }
    fetchDonationProgress();
  </script>
</body>
</html>
