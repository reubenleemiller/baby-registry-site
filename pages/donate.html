
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contribute to the Stroller Fund</title>
  <link href="../assets/style.css" rel="stylesheet">
  <script src="https://js.stripe.com/v3/"></script>
  <style>
    .donation-section {
      padding: 1rem;
      max-width: 500px;
      margin: 0 auto;
    }
    .donation-section form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .donation-section label {
      font-weight: bold;
    }
    .stripe-style {
      padding: 0.5rem;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }
    #error-message {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contribute to Our Stroller Fund</h1>
    <p>We appreciate your support — every dollar helps!</p>
  </header>

  <section class="goal-section">
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="amount-text" id="amountText">$0 of $346.49 goal</div>
  </section>

  <section class="donation-section">
    <form id="payment-form">
      <div id="donationDisplay"></div>

      <label for="firstName">First Name:</label>
      <input type="text" id="firstName" name="firstName" required class="stripe-style" />

      <label for="lastName">Last Name:</label>
      <input type="text" id="lastName" name="lastName" required class="stripe-style" />

      <label for="email">Email (for receipt):</label>
      <input type="email" id="email" name="email" required class="stripe-style" />

      <div id="payment-element"></div>
      <button id="submit" class="donate-button">Submit Donation</button>
      <div id="error-message"></div>
    </form>
  </section>

  <script src="../scripts/donation.js"></script>
</body>
</html>
